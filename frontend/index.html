<!DOCTYPE html>
<html>
<head>
    <title>VYBE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="cells.css">
    <link rel="stylesheet" href="dropdown.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!--Show site name, search bar, events tab, music player tab, and profile + settings icons-->
<header>
    <div id="logo">
        <img src="title-logo2.jpg">
    </div>
    <input id="searchBar" type="text" placeholder="Search music & events!">
    <div id="searchSuggestions" class="dropdown hidden"></div>
    <button id="searchButton"><i class="fa-solid fa-search"></i></button>

    <button id="tab1Button" class="active-tab button">Music Player</button>
    <button id="tab2Button" class="button">Live Events</button>

    <div class="top-icons">
        <button id="gear" title="Settings"><i class="fa-solid fa-gear"></i></button>
        <button id ="person" title="Profile"><i class="fa-solid fa-user-circle"></i></button>
    </div>
</header>

<!--Music Player Tab Active-->
<div id="tab1" class="screen active">

    <div class="grid">


        <!--leftmost cell-->
        <div class="cell left" id="userLibrary" draggable="true">
            <div class="library-header">
                <h3>Your music</h3>

                <div class="library-icons">
                    <button id="menuBtn"><i class="fa-solid fa-bars"></i></button>
                </div>
            </div>

            <div class="library-filters">
                <button class="filter-btn active" data-type="playlists">Playlists</button>
                <button class="filter-btn" data-type="albums">Albums</button>
                <button class="filter-btn" data-type="artists">Artists</button>
            </div>

            <input 
                type="text" 
                id="librarySearch" 
                placeholder="Search"
                class="library-search"
            >

            <div id="libraryList" class="library-list"></div>
        </div>
        

        <!--middle cell-->
        <div class="cell middle" id="results" draggable="true">
            <div class="section">
                <h3>Recommendations</h3>
                <div class="card-row" id="recommendRow"></div>
            </div>

            <div class="section">
                <h3>Recently Played</h3>
                <div class="card-row" id="recentRow"></div>
            </div>

            <div class="section">
                <h3>Liked Songs</h3>
                <div class="card-row" id="favSongsRow"></div>
            </div>

            <div class="section">
                <h3>Viewed Artists</h3>
                <div class="card-row" id="favArtistsRow"></div>
            </div>

            <div class="section">
                <h3>Viewed Albums</h3>
                <div class="card-row" id="favAlbumsRow"></div>
            </div>
        </div>


        <!--rightmost cell-->
        <div class="cell right" draggable="true">
            <div class="now-playing-image">
                <img id="nowPlayingImg" src="" alt="Album">
                <span id="nowPlayingFallback"></span>
            </div>

            <div class="now-playing-info">
                <div id="nowPlayingTitle">------------------</div>
                <div id="nowPlayingArtist">---------------------------------------</div>
            </div>

            </div>
        </div>
    </div>

</div>

<!-- FILTER MENU -->
<div id="sortMenu" class="dropdown hidden">
    <h3>Sort By</h3>
    <div class="sort-option active" data-sort="recent">Most Recent</div>
    <div class="sort-option" data-sort="added">Oldest</div>
    <div class="sort-option" data-sort="alpha">Alphabetical</div>
</div>

<!-- QUEUE MENU -->
<div id="queueMenu" class="dropdown hidden">
  <h3>Current</h3>
  <div id="currentTrack"></div>

  <h3>Next</h3>
  <div id="queueList"></div>
</div>

<!-- SETTINGS MENU -->
<div id="settingsMenu" class="dropdown hidden">
  <h3>Dark Mode</h3>
  <label class="switch">
    <input type="checkbox" id="darkToggle" checked>
    <span class="slider"></span>
  </label>

  <h3>Location Preferences</h3>

  <div class="input-group">
    <label>City</label>
    <input type="text" placeholder="enter city">
  </div>

  <div class="input-group">
    <label>State</label>
    <input type="text" placeholder="enter state">
  </div>

  <div class="input-group">
    <label>Zip Code</label>
    <input type="text" placeholder="enter zip code">
  </div>
</div>


<!-- PROFILE MENU -->
<div id="profileMenu" class="dropdown hidden">

  <input 
    type="text" 
    id="usernameInput" 
    placeholder="Username"
  >

  <div class="profile-pic">
    <img id="profileImage" src="">
    <span id="profileFallback">
        <i class="fa-solid fa-user-circle"></i>
    </span>
  </div>

  <input type="file" id="imageUpload" accept="image/*">

</div>


<!--Events Tab Active-->
<div id="tab2" class="screen">
    <div id="eventsMainContent">
        <section class="event-list">
            <h2>Events</h2>
                <div class="carousel-mechanism">
                    <button class="arrow left" data-track="eventsTrack">&#9664;</button>

                    <div class="carousel-track" id="eventsTrack"></div>

                    <button class="arrow right" data-track="eventsTrack">&#9654;</button>
                </div>
        </section>

        <section class="event-list">
            <h2>For You</h2>   
            <div class="carousel-mechanism">
                <button class="arrow left" data-track="forYouTrack">&#9664;</button>

                <div class="carousel-track" id="forYouTrack"></div>

                <button class="arrow right" data-track="forYouTrack">&#9654;</button>
            </div>
        </section>
    </div>
    <div id="eventDetailContainer"></div>
</div>


<!--Play Button-->
<footer class="now-playing">
    <div class="player-left">
        <div class="album-art">
            <img id="albumArt" src="" alt="Album cover">
            <span id="albumArtFallback"></span>
        </div>

    <div class="track-meta">
        <div id="songTitle" class="song-title"></div>
        <div id="artistName" class="artist-name"></div>
    </div>
  </div>

  <div class="player-center">
    <div class="player-controls">
      <button class="player-btn small" id="loopBtn" title="Loop">
        <i class="fa-solid fa-repeat"></i>
      </button>

      <button class="player-btn" id="prevBtn" title="Previous">
        <i class="fa-solid fa-backward-step"></i>
      </button>

      <button class="player-btn play-btn" id="playPauseBtn" title="Play/Pause">
        <i class="fa-solid fa-play" id="playPauseIcon"></i>
      </button>

      <button class="player-btn" id="nextBtn" title="Next">
        <i class="fa-solid fa-forward-step"></i>
      </button>

      <button class="player-btn small" id="queueBtn" title="Queue">
        <i class="fa-solid fa-list-ul"></i>
      </button>
    </div>

    <div class="progress-wrap">
      <span id="currentTime">00:00</span>
      <input type="range" id="progressBar" min="0" max="100" value="0">
      <span id="duration">00:00</span>
    </div>
  </div>

  <div class="player-right">
    <i class="fa-solid fa-volume-high volume-icon"></i>
    <input type="range" id="volumeSlider" min="0" max="100" value="70">
  </div>
</footer>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script src="script.js"></script>
</body>
</html>
