<!DOCTYPE html>
<html>
<head>
    <title>VYBE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!--Show site name, search bar, events tab, music player tab, and profile + settings icons-->
<header>
    <h1 class = "logo">
        <img src = "title-logo2.jpg">
    </h1>
    <input type="text" placeholder="Search music & events!">

    <button id="tab1Button" class="active-tab">Music Player</button>
    <button id="tab2Button">Live Events</button>

    <div class="top-icons">
        <img src="https://cdn-icons-png.flaticon.com/512/3524/3524636.png" />
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" />
    </div>
</header>

<!--Music Player Tab Active-->
<div id="tab1" class="screen active">

    <!--Grid container for draggable boxes-->
    <div class="grid">
        <div class="cell side" draggable="true">User Library</div>
        <div class="cell middle" draggable="true">Search Results/Playlist Content</div>
        <div class="cell side" draggable="true">Currently-Playing Song Infographic</div>
    </div>

</div>

<!--Events Tab Active-->
<div id="tab2" class="screen">
    <section class="event-list">
        <h2>Events</h2>
        <div class="carousel-mechanism">
            <button class="arrow left" data-track="eventsTrack">&#9664;</button>

            <div class="carousel-slide" id="eventsTrack">
                <div class="event">Event 1</div>
                <div class="event">Event 2</div>
                <div class="event">Event 3</div>
                <div class="event">Event 4</div>
                <div class="event">Event 5</div>
                <div class="event">Event 6</div>
            </div>

            <button class="arrow right" data-track="eventsTrack">&#9654;</button>
        </div>
    </section>

    <section class="event-list">
        <h2>For You</h2>   
        <div class="carousel-mechanism">
            <button class="arrow left" data-track="forYouTrack">&#9664;</button>

            <div class="carousel-slide" id="forYouTrack">
                <div class="event">Recommendation 1</div>
                <div class="event">Recommendation 2</div>
                <div class="event">Recommendation 3</div>
                <div class="event">Recommendation 4</div>
                <div class="event">Recommendation 5</div>
                <div class="event">Recommendation 6</div>
            </div>

            <button class="arrow right" data-track="forYouTrack">&#9654;</button>
        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
